name = "neovim"
description = "neovim + lazy.nvim config"
tags = ["essential"]
depends_on = ["git", "asdf"]

[[packages]]
manager = "pacman"
names = ["neovim", "lazygit", "ripgrep", "fd", "unzip", "tree-sitter-cli"]

[[packages]]
manager = "apt"
names = ["ripgrep", "fd-find", "unzip"]

[[symlinks]]
src = "files/nvim"
dst = "~/.config/nvim"
