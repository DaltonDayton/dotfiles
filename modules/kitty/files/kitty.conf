# ======= hyde conf =======

# This is the configuration file for kitty terminal
# For more information, see https://sw.kovidgoyal.net/kitty/conf.html
# For your custom configurations, put it in ./kitty.conf

# Allow remote control (needed for live theme switching)
allow_remote_control yes
listen_on unix:/tmp/kitty-socket

font_family CaskaydiaCove Nerd Font

bold_font auto
italic_font auto
bold_italic_font auto
enable_audio_bell no
font_size 11.0
window_padding_width 25
cursor_trail 0

# Themes can override any settings in this file
background_opacity 0.90
#hide_window_decorations yes
#confirm_os_window_close 0

# ======= kitty conf =======

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# Make Shift+Enter distinct (CSI-u), useful inside tmux/TUIs
map shift+enter send_text all \x1b[13;2u

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no


# ======= theme conf =======
# Theme colors are managed by the theme switcher.
# Do not add color definitions here — they come from the included file.
include ~/.config/kitty/kitty-theme.conf
