name = "hyprland"
description = "Hyprland desktop session: WM, bar, terminal, theming"
tags = ["essential", "desktop"]
depends_on = ["fonts"]

[[packages]]
manager = "pacman"
names = [
    "hyprland", "hyprpaper", "hypridle", "hyprlock", "hyprlauncher",
    "hyprpicker", "hyprpolkitagent", "qt5-wayland", "qt6-wayland",
    "waybar", "rofi", "kitty", "swaync", "sddm",
    "pipewire-pulse", "pavucontrol",
    "bluez", "bluez-utils", "blueman",
    "grim", "slurp", "satty", "wl-clipboard", "wf-recorder",
    "cliphist",
    "tesseract", "tesseract-data-eng", "libnotify", "wtype",
    "xdg-utils", "desktop-file-utils", "shared-mime-info", "archlinux-xdg-menu",
    "jq", "btop",
    "awww",
    "nwg-look",
]

[[packages]]
manager = "aur"
names = ["matugen-bin", "bibata-cursor-theme-bin", "grimblast-git", "python-pywalfox", "wlogout", "voxtype"]

# archlaptop only: SoundWire mic firmware (rt715) + NVIDIA Optimus stack so
# voxtype's Vulkan backend can target the dGPU instead of nouveau.
[[packages]]
manager = "pacman"
hosts = ["archlaptop"]
names = [
    "sof-firmware",
    "linux-headers",     # required for nvidia-open-dkms module build
    "nvidia-open-dkms",
    "nvidia-utils",
    "nvidia-prime",
    "vulkan-tools",
]

[[symlinks]]
src = "files/hypr"
dst = "~/.config/hypr"

[[symlinks]]
src = "files/waybar"
dst = "~/.config/waybar"

[[symlinks]]
src = "files/kitty"
dst = "~/.config/kitty"

[[symlinks]]
src = "files/matugen"
dst = "~/.config/matugen"

[[symlinks]]
src = "files/voxtype"
dst = "~/.config/voxtype"

[[symlinks]]
src = "files/wallpapers"
dst = "~/.config/wallpapers"

[[symlinks]]
src = "files/themes"
dst = "~/.config/themes"

[[symlinks]]
src = "files/rofi"
dst = "~/.config/rofi"

[[symlinks]]
src = "files/swaync"
dst = "~/.config/swaync"

[[symlinks]]
src = "files/wlogout"
dst = "~/.config/wlogout"

[[files]]
dst = "~/.config/cliphist/config"
content = "max-items=100\n"

[[services]]
scope = "system"
name = "bluetooth.service"
state = "enabled"

[[services]]
scope = "system"
name = "sddm.service"
state = "enabled"
