# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

source = ~/.config/hypr/colors/colors.conf
source = ./programs.conf
source = ./monitors.conf
source = ./windowrules.conf
source = ./keybindings.conf
source = ~/.config/hypr/conf.d/voxtype-submap.conf
# source = ~/.config/hypr/colors.conf


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = awww-daemon
exec-once = hypridle
exec-once = swaync
exec-once = solaar --window=hide
exec-once = kbuildsycoca6 # File Extension Discovery (Requires: env = XDG_MENU_PREFIX,arch-)
exec-once = systemctl --user start voxtype # Voice dictation daemon
exec-once = wl-paste --watch cliphist store # Clipboard history
exec-once = nm-applet --indicator


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = XDG_MENU_PREFIX,arch- # File Extension Discovery (Requires: exec-once = kbuildsycoca6)

# NEEDED FOR NVIDIA 
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# END NVIDIA



