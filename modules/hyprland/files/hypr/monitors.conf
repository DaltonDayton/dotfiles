# Desktop — two stacked ultrawides + HYTE case monitor
# Top ultrawide — positioned above primary
# monitor=DP-2,3440x1440@144,0x-1440,1,vrr,0

# Bottom ultrawide (primary)
# monitor=DP-3,3440x1440@165,0x0,1,vrr,0

# HYTE Y70ti case monitor — right of bottom ultrawide, rotated 270°
# monitor=DP-1,3840x1100@60,3440x0,1,transform,3
# monitor=DP-1,disable

# Workspace-to-monitor assignments — ensures DP-3 (Samsung) is primary
# workspace = 1, monitor:DP-3, default:true
# workspace = 2, monitor:DP-2, default:true
# workspace = 3, monitor:DP-1, default:true

# HYTE touchscreen input — map to its monitor with matching transform
# device {
#     name = ilitek-------ilitek-touch
#     output = DP-1
#     transform = 3
# }
