##################
### WORKSPACES ###
##################

# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

workspace = special:scratchpad, on-created-empty:kitty, gapsout:40, gapsin:20
workspace = special:music, on-created-empty:spotify, gapsout:20, gapsin:10
workspace = special:files, on-created-empty:dolphin, gapsout:20, gapsin:10
workspace = special:monitoring, on-created-empty:[float] kitty -e btop, gapsout:30, gapsin:15
workspace = special:obsidian, on-created-empty:obsidian, gapsout:25, gapsin:12

##############
### LAYERS ###
##############

layerrule = blur on, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

###############
### WINDOWS ###
###############

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

windowrule {
    # Ignore maximize requests from all apps.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = world-of-warcraft
    match:title = World of Warcraft
    idle_inhibit = always
    opacity = 1
    no_anim = on
    no_blur = on
    no_dim = on
    no_shadow = on
    render_unfocused = on
    immediate = on
    fullscreen = on
    fullscreen_state = 2 2
}

windowrule {
    name = games
    match:title = Zoo Tycoon
    idle_inhibit = always
    opacity = 1
    no_anim = on
    no_blur = on
    no_dim = on
    no_shadow = on
    fullscreen = on
    fullscreen_state = 3
    render_unfocused = on
    monitor = DP-1
}

windowrule {
    name = tradeskillmaster-float
    match:title = TradeSkillMaster Application.*
    float = yes
}

windowrule {
    name = battlenet-float
    match:title = Battle.net
    float = yes
}
