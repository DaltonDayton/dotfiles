[Service]
# Optimus laptop: enable the NVIDIA Optimus Vulkan layer so the dGPU is
# usable. Device selection itself is done in voxtype's config via
# `gpu_device = 1` (configs/archlaptop.toml); the env-var-based filter
# VOXTYPE_VULKAN_DEVICE=nvidia gets ignored on this rig.
Environment="__NV_PRIME_RENDER_OFFLOAD=1"
