# Restrict X to the Intel iGPU on Optimus laptops.
# On warm reboot, the NVIDIA GPU has dirty state that causes Xorg to segfault
# when auto-detected. SDDM only needs the Intel iGPU for the greeter.
# Hyprland uses the NVIDIA GPU directly via Wayland and is unaffected.
Section "ServerFlags"
    Option "AutoAddGPU" "false"
EndSection

Section "Device"
    Identifier "Intel iGPU"
    Driver "modesetting"
    BusID "PCI:0:2:0"
EndSection
