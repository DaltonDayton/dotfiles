name        = "ai"
description = "Claude Code and opencode — binaries, settings, and customizations"
tags        = ["essential", "ai"]
depends_on  = ["asdf"]

[[packages]]
manager = "pacman"
names   = ["opencode", "socat", "jq"]

[[packages]]
manager = "aur"
names   = ["claude-code"]

[[packages]]
manager = "apt"
names = ["socat", "jq"]

# settings.json is generated by install.sh (base + per-machine settings.local.json
# overlay merge), so it is intentionally not symlinked here.

[[symlinks]]
src = "files/claude/CLAUDE.md"
dst = "~/.claude/CLAUDE.md"

[[symlinks]]
src = "files/claude/rules"
dst = "~/.claude/rules"

[[symlinks]]
src = "files/claude/stacks"
dst = "~/.claude/stacks"

[[symlinks]]
src = "files/opencode/opencode.json"
dst = "~/.config/opencode/opencode.json"

[[symlinks]]
src = "files/opencode/tui.json"
dst = "~/.config/opencode/tui.json"
