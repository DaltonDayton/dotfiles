name = "asdf"
description = "language runtimes (asdf-managed nodejs/ruby + system dotnet)"
tags = ["essential"]
depends_on = ["git"]

[[packages]]
manager = "pacman"
names = ["dotnet-sdk", "libyaml"]

[[packages]]
manager = "aur"
names = ["asdf-vm"]

[[packages]]
manager = "apt"
names = [
  "dotnet-sdk-10.0",
  "autoconf", "patch", "build-essential", "rustc", "libssl-dev", "libyaml-dev",
  "libreadline-dev", "zlib1g-dev", "libgmp-dev", "libncurses-dev",
  "libffi-dev", "libgdbm-dev", "libdb-dev", "uuid-dev",
]
