[aws]
disabled = true
symbol = "ΌΝ╜ "

[custom.aws_project]
command = "echo ΌΝ╜ $(aws configure get region)"
when = '''
    test -d .elasticbeanstalk ||
    test -d terraform ||
    test -d infra ||
    test -d cdk ||
    test -d deploy
'''
style = "bright-blue"
format = "[$output]($style)"

