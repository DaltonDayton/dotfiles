name = "gaming"
description = "Wine, DXVK, Vulkan tooling, Steam, lib32 runtimes"
tags = ["gaming"]
hosts = ["archlinux"]

[[packages]]
manager = "pacman"
names = [
    # Core
    "wine",
    "winetricks",
    # "wine-staging",  # Failing. Conflicts with 'wine'
    "dxvk",
    "vkd3d",
    "lib32-alsa-lib",
    "lib32-pipewire",
    "lib32-libpulse",
    "giflib",
    "lib32-giflib",
    "gnutls",
    "lib32-gnutls",
    "v4l-utils",
    "lib32-v4l-utils",
    "libxcomposite",
    "lib32-libxcomposite",
    "libxinerama",
    "lib32-libxinerama",
    "openal",
    "lib32-openal",
    "libxslt",
    "lib32-libxslt",

    # Vulkan & Performance Utilities
    "vulkan-icd-loader",
    "lib32-vulkan-icd-loader",
    "gamemode",
    "lib32-gamemode",
    "gamescope",
    "mangohud",
    "lib32-mangohud",

    # Launcher Dependencies?
    "curl",
    "cabextract",
    "wget",
    "unzip",
    "zenity",
    "xdg-utils",

    # Fonts
    # "ttf-ms-win11-auto",  # Failing
    "ttf-liberation",
    "noto-fonts",
    "noto-fonts-cjk",
    "noto-fonts-emoji",

    # Launcher
    # "lutris",
    # "bottles",
    "steam",

    # Communication
    # "discord",

    # WoW
    # "curseforge",
    # "weakauras-companion-bin",
]

[[packages]]
manager = "aur"
names = ["faugus-launcher"]
